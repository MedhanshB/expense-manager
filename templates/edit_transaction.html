{% extends "base.html" %}

{% block title %}
Edit Transactions
{% endblock %}

{% block content %}

<div class="form-card">
    <h2>Edit Transaction</h2>
    <form method="post">
        <!-- improve on this later on as the app comes to a finish so you can display income and expense in a separte optselect something -->
        <label for="category" class="col-form-label">Category</label>
        <select name="category" class="form-select">
            {% for category in categories %}
            <option value="{{ category['id'] }}" 
                {% if category['id'] == transaction['category_id'] %} 
                    selected
                {% endif %}>
                {{ category["name"] }}
            </option>
            {% endfor %}
        </select>

        <label for="amount" class="col-form-label">Amount</label>
        <input type="number" name="amount" class="form-control" min="0.01" step="0.01"
            value="{{ request.form.get('amount', transaction['amount']) }}" placeholder="0.00" required>

        <label for="description" class="col-form-label">Description</label>
        <textarea name="description" class="form-control" rows="2"
            required>{{ transaction['description'] }}</textarea>

        <label for="date" class="col-form-label">Date</label>
        <input type="date" name="date" class="form-control" value="{{ transaction['transaction_date'] }}" required>

        <button type="submit" class="btn btn-primary mt-3">Update Transaction</button>

    </form>

</div>


{% endblock %}
